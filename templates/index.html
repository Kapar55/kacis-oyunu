<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kaçış Oyunu</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background: radial-gradient(circle at center, #0a0a0a, #000);
}

/* PLAYER */
#player{
    width:22px;
    height:22px;
    background:cyan;
    position:absolute;
    border-radius:50%;
    box-shadow:0 0 15px cyan;
    display:none;
}

/* ENEMY */
.enemy{
    width:22px;
    height:22px;
    background:red;
    position:absolute;
    border-radius:50%;
    box-shadow:0 0 10px red;
}

/* PORTALS */
.portal{
    position:absolute;
    width:60px;
    height:60px;
    top:50%;
    transform:translateY(-50%);
    border-radius:50%;
    background:radial-gradient(circle, black 30%, transparent 70%);
    box-shadow:0 0 20px red;
}

#leftPortal{ left:10px; }
#rightPortal{ right:10px; }

/* HAZARD */
#hazard{
    position:absolute;
    width:120px;
    height:120px;
    background:red;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 25px red;
    opacity:0.6;
}

/* UI */
#score,#best{
    position:absolute;
    left:10px;
    color:red;
    font-weight:bold;
    text-shadow:0 0 10px red;
}

#score{ top:10px; display:none; }
#best{ top:40px; }

/* MENU */
#menu{
    position:absolute;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #111, #000);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:12px;
    color:red;
    text-shadow:0 0 10px red;
}

input,button{
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    background:red;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="leftPortal" class="portal"></div>
<div id="rightPortal" class="portal"></div>
<div id="hazard"></div>

<div id="menu">
    <h1>Kaçış Oyunu</h1>
    <input id="username" placeholder="Kullanıcı adı">
    <button onclick="startGame()">BAŞLA</button>
</div>

<div id="player"></div>
<div id="score">Skor: 0</div>
<div id="best">Yükleniyor...</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
    "https://nerkibeevamzechepwio.supabase.co",
    "sb_publishable_E5sJ-sNHdSTryFbYcJMHFA_3CYHvPVE"
);

// ---------------- ELEMENTLER ----------------

const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const menu=document.getElementById("menu");
const hazard=document.getElementById("hazard");

let username="";
let gameStarted=false;

let score=0;

let x=0;
let y=0;

let vx=0;
let vy=0;

const accel=0.7;
const friction=0.9;

const keys={};
const enemies=[];

// ---------------- FPS FIX ----------------

let lastTime = performance.now();

// ---------------- SPAWN ----------------

function spawnEnemy(){

    let e=document.createElement("div");
    e.className="enemy";

    let leftPortal = document.getElementById("leftPortal").getBoundingClientRect();
    let rightPortal = document.getElementById("rightPortal").getBoundingClientRect();

    let side = Math.random() < 0.5 ? "left" : "right";

    if(side === "left"){
        e.x = leftPortal.left;
        e.y = leftPortal.top + leftPortal.height/2 - 11;
    } else {
        e.x = rightPortal.left;
        e.y = rightPortal.top + rightPortal.height/2 - 11;
    }

    let angle = Math.random() * Math.PI * 2;

    e.vx = Math.cos(angle) * 3;
    e.vy = Math.sin(angle) * 3;

    enemies.push(e);
    document.body.appendChild(e);
}

setInterval(()=>{
    if(gameStarted) spawnEnemy();
},3000);

// ---------------- LOOP ----------------

function loop(){

    if(!gameStarted) return;

    // FPS DELTA
    let now = performance.now();
    let dt = (now - lastTime) / 16.67;
    lastTime = now;

    // PLAYER INPUT
    if(keys.left) vx-=accel;
    if(keys.right) vx+=accel;
    if(keys.up) vy-=accel;
    if(keys.down) vy+=accel;

    vx*=friction;
    vy*=friction;

    x += vx * dt;
    y += vy * dt;

    if(x<0) x=0;
    if(y<0) y=0;
    if(x>innerWidth-22) x=innerWidth-22;
    if(y>innerHeight-22) y=innerHeight-22;

    player.style.left=x+"px";
    player.style.top=y+"px";

    let h = hazard.getBoundingClientRect();

    enemies.forEach((e)=>{

        e.x += e.vx * dt;
        e.y += e.vy * dt;

        if(e.x<0||e.x>innerWidth) e.vx*=-1;
        if(e.y<0||e.y>innerHeight) e.vy*=-1;

        // hazard bounce
        if(
            e.x < h.left + h.width &&
            e.x + 22 > h.left &&
            e.y < h.top + h.height &&
            e.y + 22 > h.top
        ){
            e.vx *= -1;
            e.vy *= -1;
            e.x += e.vx * 2;
            e.y += e.vy * 2;
        }

        e.style.left=e.x+"px";
        e.style.top=e.y+"px";

        // player collision
        if(
            x < e.x + 22 &&
            x + 22 > e.x &&
            y < e.y + 22 &&
            y + 22 > e.y
        ){
            gameOver();
        }
    });

    // hazard death
    if(
        x < h.left + h.width &&
        x + 22 > h.left &&
        y < h.top + h.height &&
        y + 22 > h.top
    ){
        gameOver();
    }

    score++;
    scoreEl.innerText="Skor: "+score;

    requestAnimationFrame(loop);
}

// ---------------- GAME OVER ----------------

function gameOver(){

    gameStarted=false;

    supabase.from("leaderboard").insert([
        {name:username,score:score}
    ]);

    menu.style.display="flex";

    menu.innerHTML=`
        <h1>OYUN BİTTİ</h1>
        <h2>Skor: ${score}</h2>
        <button onclick="location.reload()">TEKRAR</button>
    `;
}

// ---------------- START ----------------

function startGame(){

    username=document.getElementById("username").value||"Anon";

    menu.style.display="none";

    player.style.display="block";
    scoreEl.style.display="block";

    gameStarted=true;
    score=0;

    let r = hazard.getBoundingClientRect();

    x = innerWidth/2;
    y = r.top - 60;

    vx=0;
    vy=0;

    loop();
}

window.startGame=startGame;

// ---------------- CONTROLS ----------------

document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowLeft") keys.left=true;
    if(e.key==="ArrowRight") keys.right=true;
    if(e.key==="ArrowUp") keys.up=true;
    if(e.key==="ArrowDown") keys.down=true;
});

document.addEventListener("keyup",(e)=>{
    if(e.key==="ArrowLeft") keys.left=false;
    if(e.key==="ArrowRight") keys.right=false;
    if(e.key==="ArrowUp") keys.up=false;
    if(e.key==="ArrowDown") keys.down=false;
});

// ---------------- BEST SCORE ----------------

async function loadBest(){

    let { data } = await supabase.from("leaderboard").select("*");

    if(!data || data.length===0){
        bestEl.innerText="En Yüksek: 0";
        return;
    }

    let best=data.sort((a,b)=>b.score-a.score)[0];

    bestEl.innerText="En Yüksek: "+best.name+" - "+best.score;
}

loadBest();

</script>

</body>
</html>
