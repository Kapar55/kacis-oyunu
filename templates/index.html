<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kaçış Oyunu</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background: radial-gradient(circle at center, #0a0a0a, #000);
}

#player{
    width:22px;
    height:22px;
    background:cyan;
    position:absolute;
    border-radius:50%;
    box-shadow:0 0 15px cyan;
    display:none;
}

.enemy{
    width:22px;
    height:22px;
    background:red;
    position:absolute;
    border-radius:50%;
    box-shadow:0 0 10px red;
}

.portal{
    position:absolute;
    width:60px;
    height:60px;
    top:50%;
    transform:translateY(-50%);
    border-radius:50%;
    background:radial-gradient(circle, black 30%, transparent 70%);
    box-shadow:0 0 20px red;
}

#leftPortal{ left:10px; }
#rightPortal{ right:10px; }

#hazard{
    position:absolute;
    width:120px;
    height:120px;
    background:red;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 25px red;
    opacity:0.6;
}

#score,#best{
    position:absolute;
    left:10px;
    color:red;
    font-weight:bold;
    text-shadow:0 0 10px red;
}

#score{ top:10px; display:none; }
#best{ top:40px; }

#menu{
    position:absolute;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #111, #000);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:12px;
    color:red;
    text-shadow:0 0 10px red;
}

input,button{
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    background:red;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="leftPortal" class="portal"></div>
<div id="rightPortal" class="portal"></div>
<div id="hazard"></div>

<div id="menu">
    <h1>Kaçış Oyunu</h1>
    <input id="username" placeholder="Kullanıcı adı">
    <button onclick="startGame()">BAŞLA</button>
</div>

<div id="player"></div>
<div id="score">Skor: 0</div>
<div id="best">En Yüksek: Yükleniyor...</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
    "https://nerkibeevamzechepwio.supabase.co",
    "sb_publishable_E5sJ-sNHdSTryFbYcJMHFA_3CYHvPVE"
);

// ---------------- SPEED ----------------
const speed = 5;

// ---------------- ELEMENTS ----------------
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const menu=document.getElementById("menu");

let username="";
let gameStarted=false;
let score=0;

let x=0;
let y=0;

const keys={};
const enemies=[];

// ---------------- JOYSTICK ----------------
let joyActive=false;
let joyX=0;
let joyY=0;
let joyCenterX=0;
let joyCenterY=0;

document.addEventListener("touchstart",(e)=>{
    let t=e.touches[0];
    joyActive=true;
    joyCenterX=t.clientX;
    joyCenterY=t.clientY;
    joyX=t.clientX;
    joyY=t.clientY;
});

document.addEventListener("touchmove",(e)=>{
    let t=e.touches[0];
    joyX=t.clientX;
    joyY=t.clientY;
});

document.addEventListener("touchend",()=>{
    joyActive=false;
});

// ---------------- SPAWN ----------------
function spawnEnemy(){

    let e=document.createElement("div");
    e.className="enemy";

    let left=document.getElementById("leftPortal").getBoundingClientRect();
    let right=document.getElementById("rightPortal").getBoundingClientRect();

    let side=Math.random()<0.5?"left":"right";

    if(side==="left"){
        e.x=left.left;
        e.y=left.top+left.height/2-11;
    }else{
        e.x=right.left;
        e.y=right.top+right.height/2-11;
    }

    let angle=Math.random()*Math.PI*2;

    e.vx=Math.cos(angle)*4.5;
    e.vy=Math.sin(angle)*4.5;

    enemies.push(e);
    document.body.appendChild(e);
}

setInterval(()=>{
    if(gameStarted) spawnEnemy();
},3000);

// ---------------- LOOP ----------------
function loop(){

    if(!gameStarted) return;

    let vx=0;
    let vy=0;

    // MOBILE
    if(joyActive){
        let dx=joyX-joyCenterX;
        let dy=joyY-joyCenterY;

        let dist=Math.sqrt(dx*dx+dy*dy);
        let max=60;

        if(dist>max){
            dx=(dx/dist)*max;
            dy=(dy/dist)*max;
        }

        vx=dx/max*speed;
        vy=dy/max*speed;
    }

    // PC
    else{
        if(keys.left) vx=-speed;
        if(keys.right) vx=speed;
        if(keys.up) vy=-speed;
        if(keys.down) vy=speed;
    }

    x+=vx;
    y+=vy;

    if(x<0) x=0;
    if(y<0) y=0;
    if(x>innerWidth-22) x=innerWidth-22;
    if(y>innerHeight-22) y=innerHeight-22;

    player.style.left=x+"px";
    player.style.top=y+"px";

    let h=document.getElementById("hazard").getBoundingClientRect();

    let hx=innerWidth/2-60;
    let hy=innerHeight/2-60;
    let hw=120;
    let hh=120;

    enemies.forEach(e=>{

        e.x+=e.vx;
        e.y+=e.vy;

        if(e.x<0||e.x>innerWidth) e.vx*=-1;
        if(e.y<0||e.y>innerHeight) e.vy*=-1;

        e.style.left=e.x+"px";
        e.style.top=e.y+"px";

        if(
            x<e.x+22 &&
            x+22>e.x &&
            y<e.y+22 &&
            y+22>e.y
        ){
            gameOver();
        }
    });

    // 💥 GARANTİ HAZARD COLLISION
    if(
        x < hx + hw &&
        x + 22 > hx &&
        y < hy + hh &&
        y + 22 > hy
    ){
        gameOver();
    }

    score++;
    scoreEl.innerText="Skor: "+score;

    requestAnimationFrame(loop);
}

// ---------------- START ----------------
function startGame(){

    username=document.getElementById("username").value||"Anon";

    menu.style.display="none";
    player.style.display="block";
    scoreEl.style.display="block";

    gameStarted=true;
    score=0;

    let r=document.getElementById("hazard").getBoundingClientRect();

    x=innerWidth/2;
    y=r.top-60;

    loadBest();
    loop();
}

window.startGame=startGame;

// ---------------- CONTROLS ----------------
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") keys.left=true;
    if(e.key==="ArrowRight") keys.right=true;
    if(e.key==="ArrowUp") keys.up=true;
    if(e.key==="ArrowDown") keys.down=true;
});

document.addEventListener("keyup",e=>{
    if(e.key==="ArrowLeft") keys.left=false;
    if(e.key==="ArrowRight") keys.right=false;
    if(e.key==="ArrowUp") keys.up=false;
    if(e.key==="ArrowDown") keys.down=false;
});

// ---------------- LEADERBOARD ----------------
async function loadBest(){

    const { data, error } = await supabase
        .from("leaderboard")
        .select("name, score")
        .order("score",{ascending:false})
        .limit(1);

    if(error || !data || data.length===0){
        bestEl.innerText="En Yüksek: 0";
        return;
    }

    bestEl.innerText="En Yüksek: "+data[0].name+" - "+data[0].score;
}

// ---------------- GAME OVER ----------------
function gameOver(){

    gameStarted=false;

    supabase.from("leaderboard").insert([
        {name:username,score:score}
    ]).then(()=>loadBest());

    menu.style.display="flex";

    menu.innerHTML=`
        <h1>OYUN BİTTİ</h1>
        <h2>Skor: ${score}</h2>
        <button onclick="location.reload()">TEKRAR</button>
    `;
}

loadBest();

</script>

</body>
</html>
