<!DOCTYPE html>
<html>
<head>
    <title>Kaçış Oyunu</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        #player {
            width: 20px;
            height: 20px;
            background: cyan;
            position: absolute;
        }

        .enemy {
            width: 20px;
            height: 20px;
            background: red;
            position: absolute;
        }

        #score {
            color: white;
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: Arial;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="player"></div>
<div id="score">Skor: 0</div>

<script>
let player = document.getElementById("player");
let scoreEl = document.getElementById("score");

let x = 300;
let y = 200;

// 🧠 oyuncu kontrol
let vx = 0;
let vy = 0;
let accel = 0.6;
let friction = 0.85;

let score = 0;
let gameOver = false;

let enemies = [];

// 🎮 input
let keys = {
    left: false,
    right: false,
    up: false,
    down: false
};

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") keys.left = true;
    if (e.key === "ArrowRight") keys.right = true;
    if (e.key === "ArrowUp") keys.up = true;
    if (e.key === "ArrowDown") keys.down = true;
});

document.addEventListener("keyup", (e) => {
    if (e.key === "ArrowLeft") keys.left = false;
    if (e.key === "ArrowRight") keys.right = false;
    if (e.key === "ArrowUp") keys.up = false;
    if (e.key === "ArrowDown") keys.down = false;
});

// 👾 düşman oluştur
function spawnEnemy() {
    let enemy = document.createElement("div");
    enemy.classList.add("enemy");

    let ex = Math.random() * window.innerWidth;
    let ey = Math.random() * window.innerHeight;

    enemy.style.left = ex + "px";
    enemy.style.top = ey + "px";

    enemies.push({
        el: enemy,
        x: ex,
        y: ey,
        vx: (Math.random() - 0.5) * 6, // 🔥 HIZLANDIRILDI
        vy: (Math.random() - 0.5) * 6  // 🔥 HIZLANDIRILDI
    });

    document.body.appendChild(enemy);
}

// başlangıç düşmanları
for (let i = 0; i < 5; i++) {
    spawnEnemy();
}

function gameLoop() {
    if (gameOver) return;

    // 🧍 oyuncu hareketi
    if (keys.left) vx -= accel;
    if (keys.right) vx += accel;
    if (keys.up) vy -= accel;
    if (keys.down) vy += accel;

    vx *= friction;
    vy *= friction;

    x += vx;
    y += vy;

    // sınırlar
    if (x < 0) x = 0;
    if (y < 0) y = 0;
    if (x > window.innerWidth - 20) x = window.innerWidth - 20;
    if (y > window.innerHeight - 20) y = window.innerHeight - 20;

    player.style.left = x + "px";
    player.style.top = y + "px";

    // 👾 düşman hareketi
    enemies.forEach(e => {
        e.x += e.vx;
        e.y += e.vy;

        if (e.x < 0 || e.x > window.innerWidth) e.vx *= -1;
        if (e.y < 0 || e.y > window.innerHeight) e.vy *= -1;

        e.el.style.left = e.x + "px";
        e.el.style.top = e.y + "px";

        // 💥 çarpışma
        if (
            x < e.x + 20 &&
            x + 20 > e.x &&
            y < e.y + 20 &&
            y + 20 > e.y
        ) {
            gameOver = true;
            alert("Oyun bitti! Skor: " + score);
            location.reload();
        }
    });

    // 📈 skor
    score++;
    scoreEl.innerText = "Skor: " + score;

    // 🔥 zorluk artışı
    if (score % 300 === 0) {
        spawnEnemy();
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
