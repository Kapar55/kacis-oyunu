<!DOCTYPE html>
<html>
<head>
    <title>Kaçış Oyunu</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            touch-action: none;
            overscroll-behavior: none;
            font-family: Arial;
        }

        #player {
            width: 20px;
            height: 20px;
            background: cyan;
            position: absolute;
            display: none;
        }

        .enemy {
            width: 20px;
            height: 20px;
            background: red;
            position: absolute;
        }

        #score {
            color: white;
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            display: none;
        }

        #best {
            color: gold;
            position: absolute;
            top: 40px;
            left: 10px;
            font-size: 18px;
        }

        #menu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>

<body>

<div id="menu">
    <h1>Kaçış Oyunu</h1>
    <input id="username" placeholder="Kullanıcı adı">
    <button onclick="startGame()">BAŞLA</button>
</div>

<div id="player"></div>
<div id="score">Skor: 0</div>
<div id="best">En Yüksek: Yükleniyor...</div>

<script>

let player = document.getElementById("player");
let scoreEl = document.getElementById("score");
let menu = document.getElementById("menu");

let username = "";

let x = 300;
let y = 200;

let vx = 0;
let vy = 0;

let accel = 0.6;
let friction = 0.90;

let score = 0;

let gameStarted = false;

let enemies = [];

let keys = {
    left: false,
    right: false,
    up: false,
    down: false
};

// 🏆 skor
fetch("/get_score")
.then(r => r.json())
.then(d => {
    document.getElementById("best").innerText =
        "En Yüksek: " + d.name + " - " + d.score;
})
.catch(() => {
    document.getElementById("best").innerText =
        "En Yüksek: 0";
});

// 📤 skor gönder
function sendScore(finalScore) {

    fetch("/set_score", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: username,
            score: finalScore
        })
    })
    .then(r => r.json())
    .then(d => {
        document.getElementById("best").innerText =
            "En Yüksek: " + d.name + " - " + d.score;
    });
}

// ▶️ başlat
function startGame() {

    username = document.getElementById("username").value || "Anon";

    menu.style.display = "none";
    player.style.display = "block";
    scoreEl.style.display = "block";

    gameStarted = true;

    gameLoop();
}

// ⌨️ PC kontrol
document.addEventListener("keydown", (e) => {
    if (!gameStarted) return;

    if (e.key === "ArrowLeft") keys.left = true;
    if (e.key === "ArrowRight") keys.right = true;
    if (e.key === "ArrowUp") keys.up = true;
    if (e.key === "ArrowDown") keys.down = true;
});

document.addEventListener("keyup", (e) => {
    if (!gameStarted) return;

    if (e.key === "ArrowLeft") keys.left = false;
    if (e.key === "ArrowRight") keys.right = false;
    if (e.key === "ArrowUp") keys.up = false;
    if (e.key === "ArrowDown") keys.down = false;
});

//
// 📱 YUMUŞAK MOBİL KONTROL (SON HAL)
//
let touchActive = false;

let targetVX = 0;
let targetVY = 0;

document.addEventListener("touchstart", () => {
    if (!gameStarted) return;
    touchActive = true;
});

document.addEventListener("touchend", () => {
    touchActive = false;
    targetVX = 0;
    targetVY = 0;
});

document.addEventListener("touchcancel", () => {
    touchActive = false;
    targetVX = 0;
    targetVY = 0;
});

document.addEventListener("touchmove", (e) => {
    if (!gameStarted || !touchActive) return;

    let t = e.touches[0];

    let cx = window.innerWidth / 2;
    let cy = window.innerHeight / 2;

    let dx = (t.clientX - cx);
    let dy = (t.clientY - cy);

    targetVX = dx * 0.003;
    targetVY = dy * 0.003;

    e.preventDefault();
}, { passive: false });

//
// 👾 DÜŞMAN
//
function spawnEnemy() {

    let enemy = document.createElement("div");
    enemy.classList.add("enemy");

    let ex = Math.random() * window.innerWidth;
    let ey = Math.random() * window.innerHeight;

    enemy.style.left = ex + "px";
    enemy.style.top = ey + "px";

    enemies.push({
        el: enemy,
        x: ex,
        y: ey,
        vx: (Math.random() - 0.5) * 14,
        vy: (Math.random() - 0.5) * 14
    });

    document.body.appendChild(enemy);
}

for (let i = 0; i < 5; i++) spawnEnemy();

//
// 🎮 GAME LOOP
//
function gameLoop() {

    if (!gameStarted) return;

    // 💻 klavye
    if (keys.left) vx -= accel;
    if (keys.right) vx += accel;
    if (keys.up) vy -= accel;
    if (keys.down) vy += accel;

    // 📱 mobil yumuşak kontrol
    vx += targetVX;
    vy += targetVY;

    vx *= friction;
    vy *= friction;

    x += vx;
    y += vy;

    // sınırlar
    if (x < 0) x = 0;
    if (y < 0) y = 0;

    if (x > window.innerWidth - 20)
        x = window.innerWidth - 20;

    if (y > window.innerHeight - 20)
        y = window.innerHeight - 20;

    player.style.left = x + "px";
    player.style.top = y + "px";

    enemies.forEach(e => {

        e.x += e.vx;
        e.y += e.vy;

        if (e.x < 0 || e.x > window.innerWidth) e.vx *= -1;
        if (e.y < 0 || e.y > window.innerHeight) e.vy *= -1;

        e.el.style.left = e.x + "px";
        e.el.style.top = e.y + "px";

        if (
            x < e.x + 20 &&
            x + 20 > e.x &&
            y < e.y + 20 &&
            y + 20 > e.y
        ) {

            gameStarted = false;

            sendScore(score);

            menu.style.display = "flex";
            menu.innerHTML = `
                <h1>OYUN BİTTİ</h1>
                <h2>Skor: ${score}</h2>
                <button onclick="location.reload()">TEKRAR OYNA</button>
            `;
        }
    });

    score++;
    scoreEl.innerText = "Skor: " + score;

    if (score % 300 === 0) spawnEnemy();

    requestAnimationFrame(gameLoop);
}

</script>

</body>
</html>
